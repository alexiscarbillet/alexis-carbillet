<!DOCTYPE html>
<html>
<head>
    <title>Dropdown List with Hover</title>
    <style>
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-list {
            display: none;
            position: absolute;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 5px;
        }

        .dropdown:hover .dropdown-list {
            display: block;
        }

        .dropdown-list a {
            display: block;
            padding: 5px;
            text-decoration: none;
            color: #333;
        }

        .dropdown-list a:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<h2>Select a Fruit:</h2>

<div class="dropdown">
    <span>Select an option...</span>
    <div class="dropdown-list">
        <a href="https://www.example.com/apple">Apple</a>
        <a href="https://www.example.com/banana">Banana</a>
        <a href="https://www.example.com/orange">Orange</a>
        <a href="https://www.example.com/grape">Grape</a>
    </div>
</div>

</body>
</html>
